# BioVid 5-class data config for Siamese Stage 2 — skip first 2 frames per video
# Maps overrides to runner_cfg.backbone_cfg (not model_cfg)
data_cfg:
  train_images_root: data/biovid
  val_images_root: data/biovid
  test_images_root: data/biovid
  train_data_file: data/biovid/train_skip2.txt
  val_data_file:   data/biovid/test_skip2.txt
  test_data_file:  data/biovid/test_skip2.txt

runner_cfg:
  backbone_cfg:
    prompt_learner_cfg:
      num_ranks: 5
      init_rank_path: configs/base_cfgs/data_cfg/datasets/biovid/classnames.txt
