# BioVid 3-class config
#   class 0 = {BLN, PA1, PA2}  (no pain + low pain)
#   class 1 = {PA3}            (moderate pain)
#   class 2 = {PA4}            (severe pain)
#
# This grouping is intentionally imbalanced — class 0 is roughly 3x larger
# than classes 1 and 2. Train/test files generated by:
#   python scripts/data/build_3class.py
data_cfg:
  train_images_root: data/biovid
  val_images_root:   data/biovid
  test_images_root:  data/biovid
  train_data_file:   data/biovid/train_3class.txt
  val_data_file:     data/biovid/test_3class.txt
  test_data_file:    data/biovid/test_3class.txt

runner_cfg:
  model_cfg:
    prompt_learner_cfg:
      num_ranks: 3
      init_rank_path: configs/base_cfgs/data_cfg/datasets/biovid/classnames_3class.txt
