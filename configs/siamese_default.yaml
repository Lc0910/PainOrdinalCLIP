# ==============================================================================
# Siamese Stage 2 Default Config
# ==============================================================================
# Joint loss (P0-1): ranking BCE + CE_a + CE_b
# Pair sampling (P0-2): cross-subject constraints in siamese_data.py
# Head type (P1-2): mlp (default) or linear via ranking_head_cfg.head_type
# Ranking metrics (P1-3): pairwise acc + AUC logged during training
# ==============================================================================

runner_cfg:
  seed: 114514
  output_dir: results/dummy-siamese

  # --- Backbone (from Stage 1) ---
  backbone_cfg:
    type: OrdinalCLIP
    prompt_learner_cfg:
      type: PlainPromptLearner
      num_ranks: 2
      num_base_ranks: 3
      num_tokens_per_rank: 1
      num_context_tokens: 10
      rank_tokens_position: tail
      init_rank_path: null
      init_context: null
      rank_specific_context: false
      interpolation_type: linear
    text_encoder_name: ViT-B/16
    image_encoder_name: ViT-B/16

  # --- Ranking Head ---
  ranking_head_cfg:
    head_type: mlp         # "mlp" or "linear" (P1-2)
    hidden_dims: 512
    dropout: 0.3

  freeze_backbone: true

  # --- Joint Loss Weights (P0-1) ---
  loss_weights:
    ranking_loss: 1.0
    ce_loss_a: 0.5
    ce_loss_b: 0.5

  # --- Optimizer & Scheduler ---
  optimizer_and_scheduler_cfg:
    param_dict_cfg:
      lr_ranking_head: 1.0e-03
      lr_backbone: 0.0              # 0 = frozen
    optimizer_cfg:
      optimizer_name: adam
      lr: 1.0e-03
      weight_decay: 1.0e-04
      momentum: 0.9
      sgd_dampening: 0.0
      sgd_nesterov: false
      rmsprop_alpha: 0.99
      adam_beta1: 0.9
      adam_beta2: 0.999
      staged_lr: null
      lookahead: false
    lr_scheduler_cfg:
      lr_scheduler_name: multi_step
      stepsize:
        - 30
      gamma: 0.1
      max_epochs: &max_epochs 50
      warmup_epoch: 5
      warmup_cons_lr: 1.0e-05
      warmup_min_lr: 1.0e-05
      warmup_type: constant
      warmup_recount: true

  # --- Stage 1 Checkpoint ---
  load_weights_cfg:
    backbone_ckpt_path: null         # Override with Stage 1 best ckpt

  ckpt_path: ""

# ==============================================================================
# Data Config
# ==============================================================================
data_cfg:
  pairs_per_epoch: 10000
  train_images_root: bonjour
  val_images_root: bonjour
  test_images_root: bonjour
  train_data_file: bonjour
  val_data_file: bonjour
  test_data_file: bonjour
  few_shot:
    num_shots: 0
  label_distributed_shift:
    num_topk_scaled_class: 0
    scale_factor: 1.0
  use_long_tail: false
  transforms_cfg:
    input_transforms:
      - random_resized_crop
      - random_hflip
      - normalize
    input_resize:
      - 256
      - 256
    input_size:
      - 224
      - 224
    pixel_mean:
      - 0.485
      - 0.456
      - 0.406
    pixel_std:
      - 0.229
      - 0.224
      - 0.225
  train_dataloder_cfg:
    num_workers: 8
    batch_size: 32
    shuffle: true
  eval_dataloder_cfg:
    num_workers: 8
    batch_size: 32
    shuffle: false

# ==============================================================================
# Trainer Config
# ==============================================================================
trainer_cfg:
  max_epochs: *max_epochs
  precision: 16
  accelerator: gpu
  devices: 1
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 1
  fast_dev_run: false

test_only: false
