# ==============================================================================
# Siamese Stage 2 Default Config — aligned to Fabio (2025) dissertation §5.3
# ==============================================================================
#
# Architecture:
#   OrdinalCLIP backbone (frozen) → SharedMLP (D→256→128)
#                                      ↓
#                               RegressionHead    ConcatRankingHead
#                               128→1→sigmoid     [ei ∥ ej] (256)→1
#                               ŷ ∈ (0, K-1)     s_ij (signed score)
#
# Training loss (§5.1.1.2):
#   L = mse_loss * L_mse + ranking_loss * L_hinge
#   L_mse   = MSE(ŷ_a, y_a) + MSE(ŷ_b, y_b)
#   L_hinge = mean max(0, |y_a-y_b|·margin_scale − η·s_ab)
#
# ==============================================================================

runner_cfg:
  seed: 114514
  output_dir: results/dummy-siamese

  # --- Backbone (from Stage 1) ---
  backbone_cfg:
    type: OrdinalCLIP
    prompt_learner_cfg:
      type: PlainPromptLearner
      num_ranks: 2
      num_base_ranks: 3       # ignored for PlainPromptLearner, only used by RankPromptLearner
      num_tokens_per_rank: 1
      num_context_tokens: 10
      rank_tokens_position: tail
      init_rank_path: null
      init_context: null
      rank_specific_context: false
      interpolation_type: linear
    text_encoder_name: ViT-B/16
    image_encoder_name: ViT-B/16

  # --- SharedMLP (Fabio §5.3.1) ---
  # Projects backbone features (D) into compact embedding (out_dims).
  # Both RegressionHead and ConcatRankingHead share this embedding.
  shared_mlp_cfg:
    hidden_dims: 256       # D → hidden_dims
    out_dims: 128          # hidden_dims → out_dims (e)
    dropout: 0.0           # optional dropout between layers

  # --- Concat Ranking Head (Fabio §5.3.1) ---
  # Receives [ei ∥ ej] (2*out_dims) → signed ranking score s_ij.
  # "linear" = paper default; "mlp" = higher-capacity variant.
  ranking_head_cfg:
    head_type: linear      # "linear" (paper default) or "mlp"
    hidden_dims: 256       # only used when head_type="mlp"
    dropout: 0.0           # only used when head_type="mlp"

  freeze_backbone: true

  # --- Joint Loss Weights (Fabio §5.1.1.2) ---
  loss_weights:
    mse_loss: 1.0          # weight on MSE regression loss
    ranking_loss: 0.5      # λ: weight on adaptive hinge ranking loss
    margin_scale: 1.0      # adaptive margin = |yi - yj| * margin_scale

  # --- Optimizer & Scheduler (Fabio §5.3: AdamW + CosineAnnealing) ---
  optimizer_and_scheduler_cfg:
    param_dict_cfg:
      lr_siamese_heads: 1.0e-04   # LR for SharedMLP + RegressionHead + RankingHead
      lr_backbone: 0.0            # 0 = frozen
    optimizer_cfg:
      optimizer_name: adamw       # AdamW: decoupled weight decay (Fabio §5.3)
      lr: 1.0e-04
      weight_decay: 1.0e-02       # Fabio default; stronger regularization than Adam
      momentum: 0.9
      sgd_dampening: 0.0
      sgd_nesterov: false
      rmsprop_alpha: 0.99
      adam_beta1: 0.9
      adam_beta2: 0.999
      staged_lr: null
      lookahead: false
    lr_scheduler_cfg:
      lr_scheduler_name: cosine   # CosineAnnealing: smooth LR decay (Fabio §5.3)
      stepsize:                   # (unused for cosine, kept for multi_step compat)
        - 30
      gamma: 0.1                  # (unused for cosine)
      max_epochs: &max_epochs 100 # Fabio default; EarlyStopping prevents overfitting
      warmup_epoch: 5
      warmup_cons_lr: 1.0e-05
      warmup_min_lr: 1.0e-05
      warmup_type: constant
      warmup_recount: true

  # --- EarlyStopping ---
  early_stopping_cfg:
    enabled: true
    patience: 15                  # Fabio default; stop if val MAE stalls 15 epochs
    monitor: val_mae_reg_metric
    mode: min

  # --- Stage 1 Checkpoint ---
  load_weights_cfg:
    backbone_ckpt_path: null         # Override with Stage 1 best ckpt

  ckpt_path: ""

  # --- AU Feature Fusion ---
  # Early concatenation of AU (Action Unit) features before SharedMLP.
  # AU features are extracted from OpenFace and stored in .npz files.
  # When enabled, SharedMLP input dim changes from D to D + au_dim.
  au_cfg:
    enabled: false               # set true to use AU fusion
    au_npz_path: ""              # path to .npz file with AU features
    au_dim: 17                   # 17 (all AUs) or 8 (pain-relevant subset)
    au_dropout: 0.1              # dropout on AU features before concatenation

  # --- Anchor-Based Ranking Inference ---
  anchor_inference_cfg:
    enabled: false               # set true to use ranking head at inference
    ensemble_alpha: 0.5          # cls weight: 1.0 = pure cls, 0.0 = pure rank
    anchor_mode: single          # "single" (anchor_0 only) or "dual" (both anchors)
    save_anchors: true           # save anchors.pt to output_dir
    load_anchors_path: null      # explicit path to load pre-computed anchors

# ==============================================================================
# Data Config
# ==============================================================================
data_cfg:
  pairs_per_epoch: 10000
  train_images_root: bonjour
  val_images_root: bonjour
  test_images_root: bonjour
  train_data_file: bonjour
  val_data_file: bonjour
  test_data_file: bonjour
  few_shot:
    num_shots: 0
  label_distributed_shift:
    num_topk_scaled_class: 0
    scale_factor: 1.0
  use_long_tail: false
  transforms_cfg:
    input_transforms:
      - random_resized_crop
      - random_hflip
      - normalize
    input_resize:
      - 256
      - 256
    input_size:
      - 224
      - 224
    pixel_mean:
      - 0.485
      - 0.456
      - 0.406
    pixel_std:
      - 0.229
      - 0.224
      - 0.225
  train_dataloder_cfg:
    num_workers: 8
    batch_size: 32
    shuffle: true
  eval_dataloder_cfg:
    num_workers: 8
    batch_size: 32
    shuffle: false

# ==============================================================================
# Trainer Config
# ==============================================================================
trainer_cfg:
  max_epochs: *max_epochs
  precision: 16
  accelerator: gpu
  devices: 1
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 1
  fast_dev_run: false

test_only: false
