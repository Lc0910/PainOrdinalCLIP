runner_cfg:
  seed: 42
  output_dir: results/dummy-siamese-test

  backbone_cfg:
    type: OrdinalCLIP
    prompt_learner_cfg:
      type: PlainPromptLearner
      num_ranks: 2
      num_base_ranks: 2
      num_tokens_per_rank: 1
      num_context_tokens: 4
      rank_tokens_position: tail
      init_rank_path: null
      init_context: null
      rank_specific_context: false
      interpolation_type: linear
    text_encoder_name: RN50
    image_encoder_name: RN50

  ranking_head_cfg:
    head_type: mlp
    hidden_dims: 64
    dropout: 0.1

  freeze_backbone: true

  loss_weights:
    ranking_loss: 1.0
    ce_loss_a: 0.5
    ce_loss_b: 0.5

  optimizer_and_scheduler_cfg:
    param_dict_cfg:
      lr_ranking_head: 1.0e-03
      lr_backbone: 0.0
    optimizer_cfg:
      optimizer_name: adam
      lr: 1.0e-03
      weight_decay: 0.0
      momentum: 0.9
      sgd_dampening: 0.0
      sgd_nesterov: false
      rmsprop_alpha: 0.99
      adam_beta1: 0.9
      adam_beta2: 0.999
      staged_lr: null
      lookahead: false
    lr_scheduler_cfg:
      lr_scheduler_name: multi_step
      stepsize:
        - 30
      gamma: 0.1
      max_epochs: 50
      warmup_epoch: 0
      warmup_cons_lr: 1.0e-05
      warmup_min_lr: 1.0e-05
      warmup_type: constant
      warmup_recount: true

  load_weights_cfg:
    backbone_ckpt_path: null

  ckpt_path: ""
