runner_cfg:
  seed: 42
  output_dir: results/dummy-siamese-test

  backbone_cfg:
    type: OrdinalCLIP
    prompt_learner_cfg:
      type: PlainPromptLearner
      num_ranks: 2
      num_base_ranks: 2
      num_tokens_per_rank: 1
      num_context_tokens: 4
      rank_tokens_position: tail
      init_rank_path: null
      init_context: null
      rank_specific_context: false
      interpolation_type: linear
    text_encoder_name: RN50
    image_encoder_name: RN50

  # SharedMLP — small dims for fast unit testing
  shared_mlp_cfg:
    hidden_dims: 64
    out_dims: 64
    dropout: 0.0

  # ConcatRankingHead — linear variant for simplicity
  ranking_head_cfg:
    head_type: linear
    hidden_dims: 64
    dropout: 0.0

  freeze_backbone: true

  loss_weights:
    mse_loss: 1.0
    ranking_loss: 0.5
    margin_scale: 1.0

  optimizer_and_scheduler_cfg:
    param_dict_cfg:
      lr_siamese_heads: 1.0e-03
      lr_backbone: 0.0
    optimizer_cfg:
      optimizer_name: adamw
      lr: 1.0e-03
      weight_decay: 1.0e-02
      momentum: 0.9
      sgd_dampening: 0.0
      sgd_nesterov: false
      rmsprop_alpha: 0.99
      adam_beta1: 0.9
      adam_beta2: 0.999
      staged_lr: null
      lookahead: false
    lr_scheduler_cfg:
      lr_scheduler_name: cosine
      stepsize:
        - 30
      gamma: 0.1
      max_epochs: 50
      warmup_epoch: 0
      warmup_cons_lr: 1.0e-05
      warmup_min_lr: 1.0e-05
      warmup_type: constant
      warmup_recount: true

  early_stopping_cfg:
    enabled: false            # disabled in tests for deterministic behavior
    patience: 15
    monitor: val_mae_reg_metric
    mode: min

  load_weights_cfg:
    backbone_ckpt_path: null

  ckpt_path: ""
